const SECTIONS=['Match & performance data','Social media & sentiment','Sponsorship & brand measurement','Financial & commercial data','Broadcast & viewership data','Datasets, Excel & Kaggle'];

function render(cat){
  const filtered=cat==='all'?SOURCES:SOURCES.filter(s=>s.cat===cat);
  document.getElementById('count').textContent=filtered.length+' sources';
  const bySec={};
  filtered.forEach(s=>{if(!bySec[s.section])bySec[s.section]=[];bySec[s.section].push(s);});
  document.getElementById('main').innerHTML=Object.entries(bySec).map(([sec,items])=>`
    <div class="section">
      <div class="sec-label">${sec} — ${items.length} source${items.length>1?'s':''}</div>
      <div class="grid">
        ${items.map(s=>`
          <div class="card">
            <div class="card-top">
              <div>
                <div class="card-name">${s.name}</div>
                <a class="card-url" href="${s.url}" target="_blank">${s.url.replace('https://','')}</a>
              </div>
              <span class="badge ${s.cost}">${s.costLabel}</span>
            </div>
            <div class="card-desc">${s.desc}</div>
            <div class="code">${s.endpoint}</div>
            <div class="card-meta">${s.tags.map(t=>`<span class="badge cat-badge">${t}</span>`).join('')}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function filter(cat,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render(cat);
}
